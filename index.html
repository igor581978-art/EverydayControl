<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Запуск панелі...</title>
</head>
<body style="background: #ffffff; margin: 0;" onclick="openAll()">
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; text-align: center;">
        <h2 style="font-family: sans-serif; color: #333;">Натисніть тут для запуску (15 вкладок)</h2>
        <p style="font-family: sans-serif; color: #888;">Якщо не відкрилися — перевірте дозвіл на "Pop-ups" у рядку адреси</p>
    </div>

    <script>
        const urls = [
            'https://diia.gov.ua/services/vijskovo-oblikovij-dokument',
            'https://diia.gov.ua/services/vityag-pro-nesudimist',
            'https://vs12.ukrdomen.com/roundcube/?_task=mail&_mbox=INBOX',
            'https://triada.kpi-check.online/auth/login',
            'https://edo.vchasno.ua/auth/start',
            'https://document.online/',
            'https://connect.dealssign.com/interaction/a612e4a9-356b-4239-9669-dfb781c33aa6',
            'https://youcontrol.com.ua/contractor/?id=9341729',
            'https://reyestr.court.gov.ua/',
            'https://tax.gov.ua/diyalnist-/plani-ta-zviti-roboti-',
            'https://asvpweb.minjust.gov.ua/#/search-debtors',
            'https://finance.ua/ru/currency',
            'https://moneyconvert.net/uk/converter/usd-uah/?amount=1#chart',
            'https://bank.gov.ua/ua/supervision/reorganizat-liquidat/reorganiz-history',
            'https://ips.ligazakon.net/lawnews/list?condition=day'
        ];

        function openAll() {
            urls.forEach((url, index) => {
                // Открываем каждую ссылку с нарастающей задержкой в 300мс
                setTimeout(() => {
                    window.open(url, '_blank');
                }, index * 300);
            });

            // Через 5 секунд после начала предлагаем закрыть окно
            setTimeout(() => {
                document.querySelector('h2').innerText = "Готово! Цю вкладку можна закрити.";
            }, urls.length * 300 + 1000);
        }

        // Пытаемся запустить сразу при загрузке (если браузер позволит)
        window.onload = openAll;
    </script>
</body>
</html>
