<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Запуск...</title>
</head>
<body style="background: #ffffff;" onclick="run()">
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <p style="font-family: sans-serif; color: #555;">Натисніть будь-де для запуску робочих ресурсів...</p>
    </div>

    <script>
        const urls = [
            'https://diia.gov.ua/services/vijskovo-oblikovij-dokument',
            'https://diia.gov.ua/services/vityag-pro-nesudimist',
            'https://vs12.ukrdomen.com/roundcube/?_task=mail&_mbox=INBOX',
            'https://triada.kpi-check.online/auth/login',
            'https://edo.vchasno.ua/auth/start',
            'https://document.online/',
            'https://connect.dealssign.com/interaction/a612e4a9-356b-4239-9669-dfb781c33aa6',
            'https://youcontrol.com.ua/contractor/?id=9341729',
            'https://reyestr.court.gov.ua/',
            'https://tax.gov.ua/diyalnist-/plani-ta-zviti-roboti-',
            'https://asvpweb.minjust.gov.ua/#/search-debtors',
            'https://finance.ua/ru/currency',
            'https://moneyconvert.net/uk/converter/usd-uah/?amount=1#chart',
            'https://bank.gov.ua/ua/supervision/reorganizat-liquidat/reorganiz-history',
            'https://ips.ligazakon.net/lawnews/list?condition=day'
        ];

        function run() {
            urls.forEach(url => window.open(url, '_blank'));
            // Пробуем закрыть вкладку запуска автоматически
            window.close();
            // Если браузер запретил закрытие (редко), текст подскажет, что делать
            document.body.innerHTML = "<h2 style='text-align:center;font-family:sans-serif;margin-top:20%'>Готово! Цю вкладку можна закрити.</h2>";
        }

        // Попытка автозапуска (сработает, если браузер уже "доверяет" сайту)
        window.onload = run;
    </script>
</body>
</html>
